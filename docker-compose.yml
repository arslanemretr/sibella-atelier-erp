services:
  db:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: erpsibella-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erpsibella}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_BIND_ADDRESS:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-erpsibella}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: erpsibella-api
    environment:
      API_PORT: ${API_PORT:-4001}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@db:5432/erpsibella}
      ASSET_STORAGE_PATH: ${ASSET_STORAGE_PATH:-/app/data/assets}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-4001}:4001"
    volumes:
      - app_assets:/app/data/assets
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: erpsibella-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-erpsibella_postgres_data}
  app_assets:
    name: ${APP_ASSETS_VOLUME_NAME:-erpsibella_app_assets}
